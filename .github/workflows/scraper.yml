name: Global Bug Bounty Pipeline Engine

on:
  schedule:
    - cron: '0 * * * *'  # Trigger automated fetch routine every midnight
  workflow_dispatch:     # Retain on-demand override triggers

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Clone Head Revision
      uses: actions/checkout@v4

    - name: Set up Environment Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Sync Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Fetch Operations
      run: python scraper.py

    - name: Push Data State Upgrades
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data.json
        if ! git diff --cached --quiet; then
          git commit -m "Data Sync Engine: Collected cross-platform data assets"
          git push
        else
          echo "No net telemetry modifications found today."
        fi